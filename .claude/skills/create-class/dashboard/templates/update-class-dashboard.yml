name: Update Class Dashboard

on:
  push:
    branches: [master]
    paths:
      - "demos/**"
      - "labs/**"
      - "dashboard/dashboard.json"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest --quiet

      - name: Test evaluation rules
        run: pytest dashboard/test_evaluate.py -v

      - name: Evaluate modules
        run: python dashboard/evaluate.py

      - name: Render dashboard
        run: python dashboard/render-dashboard.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/dashboard.json dashboard/index.html
          git diff --cached --quiet || (git commit -m "chore: auto-update class dashboard" && git push)

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
