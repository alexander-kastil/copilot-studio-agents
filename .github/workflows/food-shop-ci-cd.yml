name: food-shop-ci-cd

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - master
  #   paths:
  #     - "src/food-shop/**"

permissions:
  id-token: write
  contents: read

jobs:
  build_and_deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "22.12.0"
      FOOD_SHOP_APP_DIR: "src/food-shop"
      FOOD_SHOP_DIST_DIR: "food-shop"
      BUILD_CONFIGURATION: "production"
      RESOURCE_GROUP: "rg-copilot-studio"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FOOD_SHOP_APP_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: ${{ env.FOOD_SHOP_APP_DIR }}

      - name: Build Angular app
        run: npm run build --configuration=${{ env.BUILD_CONFIGURATION }}
        working-directory: ${{ env.FOOD_SHOP_APP_DIR }}

      - name: Prepare deployment package
        run: |
          rm -rf app-build
          mkdir -p app-build
          cp -a ${{ env.FOOD_SHOP_APP_DIR }}/dist/${{ env.FOOD_SHOP_DIST_DIR }}/browser/. app-build/

      - name: Copy Static Web App configuration
        run: cp ${{ env.FOOD_SHOP_APP_DIR }}/src/assets/staticwebapp.config.json app-build/staticwebapp.config.json

      - name: Azure Login (Workload Identity)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Static Web App deployment token
        id: swa-token
        run: |
          token=$(az staticwebapp secrets list \
            --name ${{ secrets.AZURE_STATIC_WEB_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.apiKey \
            --output tsv)
          echo "::add-mask::$token"
          echo "token=$token" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          action: upload
          app_location: app-build
          skip_app_build: true
          skip_api_build: true
          is_static_export: true
